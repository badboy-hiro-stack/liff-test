<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>新世代のGPS打刻システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="style.css?v=20260319">
</head>
<body onload="init()">

  <!-- ▼ 1. メイン画面（一般） -->
  <div id="mainScreen">

    <h2>打刻システム(GPS対応)</h2>

    <!-- 出勤 / 退勤 / 休憩 -->
    <div class="grid">
      <button class="btn big" id="btnIn">出勤</button>
      <button class="btn big" id="btnOut">退勤</button>
      <button class="btn big" id="btnBreakStart">休憩開始</button>
      <button class="btn big" id="btnBreakEnd">休憩終了</button>
    </div>

    <!-- 勤務状態 -->
    <div class="row">
      <button class="btn time" id="btnStatus">勤務状態</button>
    </div>

    <!-- ステータス一覧（管理者） -->
    <div class="row">
      <button class="btnadmin" id="adminButton">ステータス一覧</button>
    </div>

    <!-- 再出勤 -->
    <div class="row">
      <button class="btn force" id="btnForceIn" style="display:none;">再出勤する</button>
    </div>

    <!-- 打刻修正（管理者） -->
    <div class="row">
      <button class="btnadmin" id="adminEditButton" style="display:none;">打刻修正</button>
    </div>

    <!-- ステータス表示 -->
    <div id="status" style="font-size: 60px; font-weight: bold; margin-top: 15px;"></div>

    <!-- 結果表示 -->
    <p id="result"></p>

  </div>
  <!-- ▲ メイン画面ここまで -->


  <!-- ▼ 2. 勤務状態一覧画面（timeCard） -->
  <div id="timeCard" style="display:none; margin-top:20px;">

    <!-- 戻るボタン（timeCard 内に移動） -->
    <button class="back-button" id="btnBack">戻る</button>

    <!-- 月選択 -->
    <div style="margin-bottom:10px;">
      <select class="month-select" id="monthSelect" onchange="changeMonth()"></select>
    </div>

    <!-- タイムカード内容 -->
    <div id="timeCardContent"></div>

  </div>
  <!-- ▲ 勤務状態一覧画面ここまで -->


  <!-- ▼ 3. ステータス一覧画面（管理者） -->
  <div id="statusListScreen" style="display:none;">

    <button class="back-button" id="btnStatusBack">戻る</button>

    <div id="statusList"></div>

  </div>
  <!-- ▲ ステータス一覧画面ここまで -->


  <!-- ▼ 4. 打刻修正画面（管理者） -->
  <div id="editScreen" style="display:none; padding:20px;">

    <h2>打刻修正</h2>

    <!-- 戻る -->
    <button id="editBackButton" class="back-button">戻る</button>

    <!-- 日付選択 -->
    <div class="edit-block">
      <label>日付</label>
      <input type="date" id="editDate" onchange="loadAttendanceForEdit()">
    </div>

    <!-- 従業員選択 -->
    <div class="edit-block">
      <label>従業員</label>
      <select id="editEmployee" onchange="loadAttendanceForEdit()"></select>
    </div>

    <!-- 現在のデータ表示 -->
    <div class="edit-block">
      <label>現在の打刻データ</label>
      <div id="currentData" class="current-box">
        データを選択してください
      </div>
    </div>

    <!-- 修正入力欄 -->
    <div class="edit-block">
      <label>出勤時間</label>
      <input type="time" id="editClockIn">
    </div>

    <div class="edit-block">
      <label>退勤時間</label>
      <input type="time" id="editClockOut">
    </div>

    <div class="edit-block">
      <label>休憩時間（分）</label>
      <input type="number" id="editBreakMinutes" min="0">
    </div>

    <!-- 更新ボタン -->
    <button id="updateAttendance" class="update-button">更新</button>

  </div>
  <!-- ▲ 打刻修正画面ここまで -->

</body>

  <script>
    const liffId = "2009445215-yPBcEdg0";
    // const gasUrl = "https://script.google.com/macros/s/AKfycbwND9ZrLBq4KzUqp-8jrp7JBmREJCHRdkuQripZGiLSUIZBOxNlJ-QclgDS0ci6e8B_/exec";  // ←ここを必ず修正
    const gasUrl = "https://script.google.com/macros/s/AKfycbyBLKRlsLf909TbyXT8m5up65eLiWTxJLayBw21n_oOj9bUPaqwG5bte3YLG7m78uR_/exec";
    
    // ▼ 位置情報取得（permission API は一切使わない）
    async function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject("位置情報が取得できませんでした：" + err.message),
          { enableHighAccuracy: true }
        );
      });
    }

    // タイムカード画面表示処理
    async function showTimeCard() {
      // ▼ タイムカードの中身を初期化（最重要）
      document.getElementById("timeCardContent").innerHTML = "";
      
      // ▼ メイン画面を隠す
      document.querySelector(".grid").style.display = "none";
      document.getElementById("btnStatus").style.display = "none";
      document.getElementById("btnForceIn").style.display = "none";
      document.getElementById("status").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("adminButton").style.display = "none";
      document.getElementById("statusListScreen").style.display = "none";
      document.getElementById("btnStatusBack").style.display = "none";
    
      // ▼ タイムカード画面を表示
      document.getElementById("timeCard").style.display = "block";
    
      // ▼ ★ 戻るボタンを表示
      document.getElementById("btnBack").style.display = "block";
      
      // ▼ LINE ID を取得
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      // ▼ 今月の年月を取得
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
    
      // ▼ GAS にリクエスト
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();

      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      // ▼ タイムカード画面を描画
      renderTimeCard(json.data, json.total, year, month);
    }

    // タイムカード画面の描画
    function renderTimeCard(rows, total, year, month) {
      const container = document.getElementById("timeCardContent");
      container.innerHTML = `
        <h2>${year}年${month}月の勤務状況</h2>
    
        <table border="1">
          <tr>
            <th>日付</th>
            <th>出勤</th>
            <th>退勤</th>
            <th>労働</th>
            <th>休憩</th>
            <th>残業</th>
          </tr>
          ${rows.map(r => `
            <tr>
              <td>${formatDate(r.date)}</td>
              <td>${formatTime(r.clockIn)}</td>
              <td>${formatTime(r.clockOut)}</td>
              <td>${r.workMinutes}分</td>
              <td>${r.breakMinutes}分</td>
              <td>${r.overMinutes}分</td>
            </tr>
          `).join("")}
        </table>
    
        <h3>合計</h3>
        <p>労働時間：${total.work}分</p>
        <p>休憩時間：${total.break}分</p>
        <p>残業時間：${total.over}分</p>
      `;
    }

    // 月選択ドロップダウンを生成
    function setupMonthSelect() {
      const select = document.getElementById("monthSelect");
      const now = new Date();
      const year = now.getFullYear();
    
      // 過去12ヶ月分を表示
      for (let i = 0; i < 12; i++) {
        const d = new Date(year, now.getMonth() - i, 1);
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
    
        const option = document.createElement("option");
        option.value = `${y}-${m}`;
        option.textContent = `${y}年${m}月`;
    
        if (i === 0) option.selected = true; // 今月をデフォルト
        select.appendChild(option);
      }
    }

    // 月変更時の処理
    async function changeMonth() {
      const value = document.getElementById("monthSelect").value;
      const [year, month] = value.split("-");
    
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      renderTimeCard(json.data, json.total, year, month);
    }

    // ▼ LIFF 初期化
    async function init() {
      await liff.init({ liffId });
    
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
    
      // ▼ ★ LIFF が完全に ready になるまで確実に待つ
      await new Promise(resolve => {
        if (liff.isReady) resolve();
        else liff.ready.then(resolve);
      });
 
      // ▼ プロフィール取得
      const profile = await liff.getProfile();
      const userId = profile.userId;

      // ▼ 管理者判定　2026/03/23追記
      // const url = `${gasUrl}?action=checkAdmin&lineId=${userId}`;
      const url = `${gasUrl}?action=checkAdminSimple&userId=${userId}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.isAdmin) {
        document.getElementById("adminEditButton").style.display = "block";
      } else {
        document.getElementById("adminEditButton").style.display = "none";
      }
      
      setupMonthSelect();
    
      // ▼ UI 初期化
      document.getElementById("btnForceIn").style.display = "none";
      loadCurrentStatus(userId);
    
      // ▼ 出勤・退勤・休憩ボタン
      document.getElementById("btnIn").onclick = () => send("出勤", userId);
      document.getElementById("btnOut").onclick = () => send("退勤", userId);
      document.getElementById("btnBreakStart").onclick = () => send("休憩開始", userId);
      document.getElementById("btnBreakEnd").onclick = () => send("休憩終了", userId);
    
      // ▼ タイムカード画面
      document.getElementById("btnStatus").onclick = () => showTimeCard(userId);
      document.getElementById("timeCard").style.display = "none";
    
      // ▼ ステータス一覧
      document.getElementById("adminButton").onclick = () => showStatusList(userId);

      // ▼ 管理者用「打刻修正」画面を開く
      document.getElementById("adminEditButton").onclick = () => {
        showEditScreen();
      };
      
      // ▼ 戻るボタン
      document.getElementById("editBackButton").onclick = () => {
        hideEditScreen();
      };
      
      // 打刻修正　更新ボタンのクリックイベント
      document.getElementById("updateAttendance").onclick = updateAttendance;

      // 日付 or 従業員が変更されたらデータを読み込む
      document.getElementById("editDate").onchange = loadAttendanceForEdit;
      document.getElementById("editEmployee").onchange = loadAttendanceForEdit;
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";
    
      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;
    
        // LINEプロフィール取得
        const profile = await liff.getProfile();
    
        // 送信データ
        const payload = {
          type: type,
          lineId: profile.userId,
          name: profile.displayName,
          lat: lat,
          lng: lng
        };
    
        // GASへ送信
        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });
    
        const json = await res.json();
    
        // ▼ ★★★ ここが重要：confirm の処理 ★★★
        if (json.status === "confirm" && json.action === "clock_in") {
          document.getElementById("result").innerText = `【確認】${json.message}`;
        
          // 再出勤ボタンを表示
          const btn = document.getElementById("btnForceIn");
          btn.style.display = "block";
        
          // ボタン押下で force:true を付けて再送信
          btn.onclick = () => sendForceClockIn(profile.userId, lat, lng);
        
          return; // confirm の場合はここで終了
        }
    
        // ▼ ステータス表示（成功したときだけ更新）
        const statusBox = document.getElementById("status");
        
        if (
          json.status === "success" ||
          json.status === "complete" ||
          json.status === "continue"
        ) {
        
          if (json.action === "clock_in") {
            statusBox.innerText = "出勤中";
            statusBox.style.color = "green";
          }
        
          if (json.action === "break_start") {
            statusBox.innerText = "休憩中";
            statusBox.style.color = "orange";
          }
        
          if (json.action === "break_end") {
            statusBox.innerText = "出勤中";
            statusBox.style.color = "green";
          }
        
          if (json.action === "clock_out") {
            statusBox.innerText = "";
          }
        }
    
        // ▼ 結果表示
        let resultText = "";
    
        if (json.status === "success" || json.status === "complete" || json.status === "continue") {
      
          if (json.action === "clock_in" || json.action === "clock_out") {
            const dist = (json.distance !== undefined) ? Math.floor(json.distance) : "";
            resultText =
              `【成功】${json.message}\n地点：${json.point}\n距離：${dist}m`;
          }
        
          if (json.action === "break_start" || json.action === "break_end") {
            resultText = `【成功】${json.message}`;
          }
        
        } else {
        
          if (json.action === "clock_in" || json.action === "clock_out") {
            const dist = (json.distance !== undefined) ? Math.floor(json.distance) : "";
            resultText =
              `【エラー】${json.message}\n距離：${dist}m`;
          } else {
            resultText = `【エラー】${json.message}`;
          }
        }
    
        document.getElementById("result").innerText = resultText;
    
      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
      }
    }

    // 再出勤（force:true）を送る関数
    async function sendForceClockIn(lineId, lat, lng) {
      const payload = {
        type: "出勤",
        lineId: lineId,
        lat: lat,
        lng: lng,
        force: true
      };
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const json = await res.json();
    
      // ▼ 再出勤ボタンを隠す
      document.getElementById("btnForceIn").style.display = "none";
    
      // ▼ ステータス更新（send() と同じ成功条件）
      const statusBox = document.getElementById("status");
    
      if (
        json.status === "success" ||
        json.status === "complete" ||
        json.status === "continue"
      ) {
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
        }
      }
    
      // ▼ 結果表示
      document.getElementById("result").innerText = `【成功】${json.message}`;
    }

    // 現在のステータスを読み込む関数を追加
    async function loadCurrentStatus(lineId) {
      const payload = {
        type: "status",
        lineId: lineId
      };
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const json = await res.json();
      const statusBox = document.getElementById("status");
    
      if (json.status === "work") {
        statusBox.innerText = "勤務中";
        statusBox.style.color = "green";
      } else if (json.status === "break") {
        statusBox.innerText = "休憩中";
        statusBox.style.color = "orange";
      } else {
        statusBox.innerText = "";
      }
    }

    // ▼ 戻るボタンの処理（グローバル）
    document.getElementById("btnBack").onclick = () => {
      // タイムカード画面を隠す
      document.getElementById("timeCard").style.display = "none";
      document.getElementById("btnBack").style.display = "none";
  
      // メイン画面を表示
      document.querySelector(".grid").style.display = "grid";
      document.getElementById("btnStatus").style.display = "block";
      document.getElementById("status").style.display = "block";
      document.getElementById("result").style.display = "block";
      document.getElementById("adminButton").style.display = "block";
    };

    // 日付を YYYY/MM/DD に整形
    function formatDate(dateString) {
      const d = new Date(dateString);
      const year = d.getFullYear();
      const month = ("0" + (d.getMonth() + 1)).slice(-2);
      const day = ("0" + d.getDate()).slice(-2);
      return `${year}/${month}/${day}`;
    }
    
    // 時刻を HH:MM に整形
    function formatTime(dateString) {
      const d = new Date(dateString);
      const hours = ("0" + d.getHours()).slice(-2);
      const minutes = ("0" + d.getMinutes()).slice(-2);
      return `${hours}:${minutes}`;
    }

    async function loadStatusList(userId) {
      // alert("① loadStatusList START");
          
      const url = `${gasUrl}?action=getStatusList&userId=${userId}`;
      // alert("② URL作成完了：" + url);
    
      const res = await fetch(url);
      // alert("③ fetch完了");
    
      const json = await res.json();
      // alert("④ JSON取得完了");
    
      // alert("⑤ json.status = " + json.status);
      // alert("json.data = " + JSON.stringify(json.data));

      if (json.status === "forbidden") {
        alert("管理者専用機能です");
        return;
      }
    
      renderStatusList(json.data);
    }

    function renderStatusList(data) {
      let html = "";
    
      data.forEach(item => {
        html += `<div class="card">`;
        html += `<div class="name">${item.name}</div>`;
        html += `<div class="status ${item.statusClass}">${item.status}</div>`;
        html += `<div class="place">📍 ${item.place}</div>`;
    
        if (item.status === "退勤") {
          html += `<div>労働時間：${item.workMinutes} 分</div>`;
          html += `<div>休憩時間：${item.breakMinutes} 分</div>`;
          html += `<div>残業時間：${item.overtimeMinutes} 分</div>`;
        } else {
          html += `<div class="detail">休憩時間：${item.breakMinutes} 分</div>`;
        }
    
        html += `</div>`;
      });
    
      document.getElementById("statusList").innerHTML = html;
    }

    async function showStatusList(userId) {
      // ▼ メイン画面を隠す
      document.querySelector(".grid").style.display = "none";
      document.getElementById("btnStatus").style.display = "none";
      document.getElementById("btnForceIn").style.display = "none";
      document.getElementById("status").style.display = "none";
      document.getElementById("result").style.display = "none";
      document.getElementById("adminButton").style.display = "none";
    
      // ▼ ステータス一覧画面を表示
      document.getElementById("statusListScreen").style.display = "block";
      document.getElementById("btnStatusBack").style.display = "block";
    
      // ▼ データ読み込み
      await loadStatusList(userId);
    }

    document.getElementById("btnStatusBack").onclick = () => {
      document.getElementById("statusListScreen").style.display = "none";
      document.getElementById("btnStatusBack").style.display = "none";
    
      // ▼ メイン画面を再表示
      document.querySelector(".grid").style.display = "grid";
      document.getElementById("btnStatus").style.display = "block";
      document.getElementById("status").style.display = "block";
      document.getElementById("result").style.display = "block";
      document.getElementById("adminButton").style.display = "block";
    };

    // 日付＋従業員を選んだら GAS に問い合わせ
    let currentList = [];  // ← グローバルに保存しておく
    
    function loadAttendanceForEdit() {
      const date = document.getElementById("editDate").value;
      const name = document.getElementById("editEmployee").value;
    
      if (!date || !name) return;
    
      fetch(`${gasUrl}?action=getAttendanceListForDate&date=${date}&name=${name}`)
        .then(res => res.json())
        .then(json => {
          if (json.status !== "success") {
            alert(json.message);
            return;
          }
    
          currentList = json.list;  // ← 保存

          const select = document.getElementById("editWorkIndex");
          select.innerHTML = "";
    
          if (currentList.length === 0) {
            select.innerHTML = `<option value="">勤務なし</option>`;
            return;
          }
    
          currentList.forEach(item => {
            const option = document.createElement("option");
            option.value = item.rowIndex;   // ← これが編集対象の行番号
            option.textContent = `${item.index}勤務目（${item.clockIn}〜${item.clockOut}）`;
            select.appendChild(option);
          });
        });
    }

    function loadSelectedWork() {
      const rowIndex = document.getElementById("editWorkIndex").value;
      if (!rowIndex) return;
    
      // すでに取得済みの list から該当勤務を探す
      const item = currentList.find(x => x.rowIndex == rowIndex);
    
      document.getElementById("editClockIn").value = item.clockIn;
      document.getElementById("editClockOut").value = item.clockOut;
      document.getElementById("editBreak").value = item.breakMinutes;
    }

    　// 更新処理
    function saveAttendance() {
      const date = document.getElementById("editDate").value;
      const rowIndex = document.getElementById("editWorkIndex").value;
    
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreak").value;
    
      fetch(`${gasUrl}?action=updateAttendanceByRow`, {
        method: "POST",
        body: JSON.stringify({
          date: date,
          rowIndex: rowIndex,
          clockIn: clockIn,
          clockOut: clockOut,
          breakMinutes: breakMinutes
        })
      })
      .then(res => res.json())
      .then(json => {
        alert(json.message);
      });
    }

    // 更新ボタンで GAS に送信
    async function updateAttendance() {
      const date = document.getElementById("editDate").value;
      const name = document.getElementById("editEmployee").value;
    
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreakMinutes").value;
    
      if (!date || !name) {
        alert("日付と従業員を選択してください");
        return;
      }
    
      const url = `${gasUrl}?action=updateAttendance`
        + `&date=${date}`
        + `&name=${encodeURIComponent(name)}`
        + `&clockIn=${clockIn}`
        + `&clockOut=${clockOut}`
        + `&breakMinutes=${breakMinutes}`;
    
      const res = await fetch(url);
      const json = await res.json();
    
      alert(json.message);
    
      if (json.status === "success") {
        hideEditScreen(); // メイン画面に戻る
      }
    }

    function showEditScreen() {
      // 他の画面を非表示
      document.getElementById("mainScreen").style.display = "none";
      document.getElementById("statusListScreen").style.display = "none";
      document.getElementById("timeCard").style.display = "none";
    
      // 修正画面を表示
      document.getElementById("editScreen").style.display = "block";
      
      // F-Serviceの従業員のみ対応
      loadEmployees();
    }
    
    function hideEditScreen() {
      // 修正画面を非表示
      document.getElementById("editScreen").style.display = "none";
    
      // メイン画面に戻る（あなたの構成に合わせて変更可能）
      document.getElementById("mainScreen").style.display = "block";
    }

    // 従業員リストを読み込む関数
    function loadEmployees() {
      const url = `${gasUrl}?action=getEmployeeList`
    
      fetch(url)
        .then(res => res.json())
        .then(list => {
    
          const select = document.getElementById("editEmployee");
          select.innerHTML = "";
    
          list.forEach(name => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
          });
        })
        .catch(err => {
          alert("fetch エラー: " + err);
        });
    }

    // ▼ LIFF 初期化
    init();

    // setupMonthSelect();
  </script>
</body>
</html>
