    // ▼ 位置情報取得（permission API は一切使わない）
    async function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject("位置情報が取得できませんでした：" + err.message),
          { enableHighAccuracy: true }
        );
      });
    }

    let currentWorkRow = null;
    
    function showTaskScreen(tasks, rowIndex) {
      currentWorkRow = rowIndex;  // ← ここで保持（latestRowIndex は不要）
    
      // ▼ メイン画面を隠して作業画面を表示
      document.getElementById("mainScreen").style.display = "none";
      document.getElementById("taskScreen").style.display = "block";
    
      // ▼ チェックボックスを一旦リセット
      document.getElementById("taskSort").checked = false;
      document.getElementById("taskUnload").checked = false;
      document.getElementById("taskInspect").checked = false;
    
      // ▼ 編集モード（tasks がある場合）
      if (tasks) {
        const arr = tasks.split(",");
    
        arr.forEach(t => {
          if (t === "仕分け") document.getElementById("taskSort").checked = true;
          if (t === "荷バラシ") document.getElementById("taskUnload").checked = true;
          if (t === "検品") document.getElementById("taskInspect").checked = true;
        });
      }

      // ★★★ ここでボタンにイベントを紐付ける ★★★
      document.getElementById("btnTaskSubmit").onclick = submitTasks;
      document.getElementById("btnTaskCancel").onclick = backToMain;
    }
    
    function backToMain() {
      document.getElementById("taskScreen").style.display = "none";
      document.getElementById("mainScreen").style.display = "block";
    }

    async function handleClockOutWithTasks() {
      // ① まず退勤処理を実行
      const result = await send("退勤");
      alert("退勤レスポンス:\n" + JSON.stringify(result, null, 2));
      // ② 退勤失敗（休憩不足など）
      if (result.status !== "success") {
        alert("退勤失敗:\n" + result.message);
        return;
      }
      // ③ ★ rowIndex を受け取って保存
      // latestRowIndex = result.rowIndex;
      latestRowIndex = result.data.rowIndex;

      // ④ 退勤成功 → 作業内容画面へ
      showTaskScreen();
    }
    
    // ▼ 新規の退勤処理（GASへ送信）
    function clockOutTasks(tasks) {
      alert("clockOutTasks START");
      setTimeout(() => {
        alert("fetch to: " + gasUrl);
        fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: "作業内容",
            rowIndex: latestRowIndex,
            tasks: tasks
          })
        })
        // .then(res => res.json())
        .then(res => {
          alert("fetch OK, status=" + res.status);
          return res.json();
        })
        .then(json => {
          alert("作業内容を記録しました");
          backToMain();
        })
        .catch(err => {
          alert("fetch ERROR: " + err);
        });
      }, 400);  // ← 150ms が最も安定
    }

    function formatDateForTimeCard(dateStr) {
      alert("formatDate が呼ばれた！ dateStr=" + dateStr);
      // "2026/04/13" を安全に分解
      const [year, month, day] = dateStr.split("/").map(Number);
      const d = new Date(year, month - 1, day);
    
      const dd = ("0" + d.getDate()).slice(-2);
      const youbi = ["日","月","火","水","木","金","土"][d.getDay()];
    
      const color =
        youbi === "土" ? "blue" :
        youbi === "日" ? "red"  : "inherit";
    
      return `<span style="font-weight:bold;">${dd}</span><span style="color:${color};">（${youbi}）</span>`;
    }

    // 月選択ドロップダウンを生成
    function setupMonthSelect() {
      const select = document.getElementById("monthSelect");
      const now = new Date();
      const year = now.getFullYear();
    
      // 過去12ヶ月分を表示
      for (let i = 0; i < 12; i++) {
        const d = new Date(year, now.getMonth() - i, 1);
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
    
        const option = document.createElement("option");
        option.value = `${y}-${m}`;
        option.textContent = `${y}年${m}月`;
    
        if (i === 0) option.selected = true; // 今月をデフォルト
        select.appendChild(option);
      }
    }

    // 月変更時の処理
    async function changeMonth() {
      const value = document.getElementById("monthSelect").value;
      const [year, month] = value.split("-");
    
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      renderTimeCard(json.data, json.total, year, month);
    }

    // ▼ LIFF 初期化
    async function init() {
      await liff.init({ liffId });
    
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
 
      // ▼ プロフィール取得
      const profile = await liff.getProfile();
      const userId = profile.userId;
      currentUserId = profile.userId;

      // ▼ UI 初期化
      document.getElementById("btnForceIn").style.display = "none";
      loadCurrentStatus(userId);

      // ▼ 管理者判定　2026/03/23追記
      const url = `${gasUrl}?action=checkAdmin&userId=${userId}`;
      // const url = `${gasUrl}?action=checkAdminSimple&userId=${userId}`;
      const res = await fetch(url);
      const json = await res.json();

      // ★ 判定結果を保存
      isAdminUser = json.isAdmin;
      
      // ★ 管理者だけボタンを表示
      if (isAdminUser) {
        document.getElementById("adminButton").style.display = "block";
        document.getElementById("adminEditButton").style.display = "block";
      } else {
        document.getElementById("adminButton").style.display = "none";
        document.getElementById("adminEditButton").style.display = "none";
      }
      
      setupMonthSelect();
    
      // ▼ 出勤・退勤・休憩ボタン
      document.getElementById("btnIn").onclick = () => send("出勤", userId);
      
      document.getElementById("btnOut").onclick = () => {
        const params = new URLSearchParams();
        params.append("action", "getLatestWorkRowForClockOut");
        params.append("lineId", userId);
      
        fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        })
        .then(res => res.json())
        .then(json => {
          if (json.status === "working") {
            const tasks = json.tasks || "";
            showTaskScreen(tasks, json.rowIndex);
          } else {
            alert("出勤していません");
          }
        })
        .catch(err => {
          // 通信エラーはユーザーに見せない
          console.log("退勤ボタン通信エラー:", err);
        });
      };
      
      document.getElementById("btnBreakStart").onclick = () => send("休憩開始", userId);
      document.getElementById("btnBreakEnd").onclick = () => send("休憩終了", userId);
    
      // ▼ タイムカード画面
      document.getElementById("btnStatus").onclick = () => showTimeCard(userId);
      document.getElementById("timeCard").style.display = "none";
    
      // ▼ ステータス一覧
      document.getElementById("adminButton").onclick = () => showStatusList(userId);

      // ▼ 管理者用「打刻修正」画面を開く
      document.getElementById("adminEditButton").onclick = () => {
        showEditScreen();
      };
      
      // ▼ 戻るボタン
      document.getElementById("editBackButton").onclick = () => {
        hideEditScreen();
      };
      
      // 打刻修正　更新ボタンのクリックイベント
      // document.getElementById("updateAttendance").onclick = updateAttendance;

      // 日付 or 従業員が変更されたらデータを読み込む
      document.getElementById("editDate").onchange = loadAttendanceForEdit;
      document.getElementById("editEmployee").onchange = loadAttendanceForEdit;
    }

    // ▼ 作業内容送信ボタン
    function submitTasks() {
      const tasks = [];
    
      if (document.getElementById("taskSort").checked) tasks.push("仕分け");
      if (document.getElementById("taskUnload").checked) tasks.push("荷バラシ");
      if (document.getElementById("taskInspect").checked) tasks.push("検品");
    
      const taskString = tasks.join(",");
    
      // ▼ rowIndex が無い場合は保存できない
      if (!currentWorkRow) {
        document.getElementById("messageArea").textContent =
          "出勤情報が取得できていません。再度出勤ボタンを押してください。";
        return;
      }
    
      // ▼ form-urlencoded で送信（Android でも安定）
      const params = new URLSearchParams();
      params.append("action", "saveTasks");
      params.append("rowIndex", currentWorkRow);
      params.append("tasks", taskString);

      fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
      })
      .then(res => res.text())
      .then(text => {
        console.log("レスポンス生データ:", text);
      
        let json;
        try {
          json = JSON.parse(text);
        } catch (e) {
          console.log("JSON parse エラー:", e);
          return;
        }
      
        if (json.status === "success") {
          // 先に画面を戻す（send() が result を必要とするため）
          document.getElementById("taskScreen").style.display = "none";
          document.getElementById("mainScreen").style.display = "block";
        
          // 退勤処理
          send("退勤");
        } else {
          document.getElementById("messageArea").textContent =
            "作業内容の保存に失敗しました。";
        }
      })
      .catch(err => {
        console.log("軽微な通信エラー:", err);
      });

      .then(res => res.json())

    // 退勤前に作業内容の有無を確認
    function clockOut() {
      // 作業内容が未登録なら退勤不可
      if (!workTasks || workTasks === "") {

          "本日の作業内容が報告されていません。作業内容の報告ボタンから該当する作業をチェックして送信してください。";

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";
    
      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;
    
        // LINEプロフィール取得
        const profile = await liff.getProfile();
    
        // ▼ form-urlencoded で送信する
        const params = new URLSearchParams();
        params.append("type", type);
        params.append("lineId", profile.userId);
        params.append("name", profile.displayName);
        params.append("lat", lat);
        params.append("lng", lng);
    
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });

        // ★★★ res.ok をチェック（重要）★★★
        if (!res.ok) {
          throw new Error("HTTPエラー");
        }
        
        const json = await res.json();
    
        // ▼ confirm（再出勤確認）
        if (json.status === "confirm" && json.action === "clock_in") {
          document.getElementById("result").innerText = `【確認】${json.message}`;
    
          const btn = document.getElementById("btnForceIn");
          btn.style.display = "block";
    
          btn.onclick = () => sendForceClockIn(profile.userId, lat, lng);
    
          return json;
        }
    
        // ▼ ステータス表示
        const statusBox = document.getElementById("status");
       
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
          // ★ 作業内容を初期化
          workTasks = "";
        }
  
        if (json.action === "break_start") {
          statusBox.innerText = "休憩中";
          statusBox.style.color = "orange";
        }
  
        if (json.action === "break_end") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
        }
  
        if (json.action === "clock_out") {
          statusBox.innerText = "";
        }
    
        // ▼ 結果表示
        let resultText = "";
    
        if (json.status === "success" || json.status === "complete" || json.status === "continue") {
          resultText = json.message;
        } else {
          resultText = `【エラー】\n${json.message}`;
        }
    
        document.getElementById("result").innerText = resultText;
        return json;
    
      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
        return { status: "error", message: e.toString() };
      }
    }

    // 日付を YYYY/MM/DD に整形
    function formatDate(dateString) {
      const d = new Date(dateString);
      const year = d.getFullYear();
      const month = ("0" + (d.getMonth() + 1)).slice(-2);
      const day = ("0" + d.getDate()).slice(-2);
      return `${year}/${month}/${day}`;
    }
    
    // 時刻を HH:MM に整形
    function formatTime(dateString) {
      const d = new Date(dateString);
      const hours = ("0" + d.getHours()).slice(-2);
      const minutes = ("0" + d.getMinutes()).slice(-2);
      return `${hours}:${minutes}`;
    }

      document.getElementById("mainScreen").style.display = "block";
    }

    // 従業員リストを読み込む関数
    function loadEmployees() {
      const url = `${gasUrl}?action=getEmployeeList`
    
      fetch(url)
        .then(res => res.json())
        .then(list => {
    
          const select = document.getElementById("editEmployee");
          select.innerHTML = "";
    
          list.forEach(name => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
          });
        })
        .catch(err => {
          alert("fetch エラー: " + err);
        });
    }

    // ▼ LIFF 初期化
    init();

    // setupMonthSelect();
  </script>
