<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>位置情報打刻システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-size: 22px;
    text-align: center;
  }

  button {
    margin: 0;            /* ブラウザ標準の余白を消す */
  }

  .row {
    margin: 15px 0;
    display: flex;
    justify-content: center;
  }

  /* 出勤・退勤を横並びにする */
  .horizontal {
    gap: 10px;            /* 間隔はここでだけ管理 */
  }

  .btn.big {
    width: 80%;           /* 基準幅：休憩ボタンと同じ */
    padding: 20px;
    font-size: 24px;
    border-radius: 10px;
  }

  /* 横並びのときは「行の幅を2分割」して揃える */
  .horizontal .btn.big {
    width: 50%;
    max-width: 200px;     /* 好みで調整：左右をきっちり同じにする */
  }
</style>

<body>
  <h2>位置情報打刻システム</h2>

  <!-- 出勤・退勤（横並び） -->
  <div class="row horizontal">
    <button class="btn big" id="btnIn">出勤</button>
    <button class="btn big" id="btnOut">退勤</button>
  </div>

  <!-- 休憩開始（縦） -->
  <div class="row">
    <button class="btn big" id="btnBreakStart">休憩開始</button>
  </div>

  <!-- 休憩終了（縦） -->
  <div class="row">
    <button class="btn big" id="btnBreakEnd">休憩終了</button>
  </div>

  <p id="result"></p>

  <script>
    const liffId = "2009445215-yPBcEdg0";
    const gasUrl = "https://script.google.com/macros/s/AKfycbwND9ZrLBq4KzUqp-8jrp7JBmREJCHRdkuQripZGiLSUIZBOxNlJ-QclgDS0ci6e8B_/exec";  // ←ここを必ず修正

    // ▼ 位置情報取得（permission API は一切使わない）
    async function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject("位置情報が取得できませんでした：" + err.message),
          { enableHighAccuracy: true }
        );
      });
    }

    // ▼ LIFF 初期化
    async function init() {
      await liff.init({ liffId });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      document.getElementById("btnIn").onclick = () => send("出勤");
      document.getElementById("btnOut").onclick = () => send("退勤");
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";

      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;

        // LINEプロフィール取得
        const profile = await liff.getProfile();

        // 送信データ
        const payload = {
          type: type,
          lineId: profile.userId,
          name: profile.displayName,
          lat: lat,
          lng: lng
        };

        // GASへ送信
        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const json = await res.json();

        // 結果表示
        if (json.status === "success") {
          document.getElementById("result").innerText =
            `【成功】${json.message}\n地点：${json.point}\n距離：${Math.floor(json.distance)}m`;
        } else {
          document.getElementById("result").innerText =
            `【エラー】${json.message}\n距離：${Math.floor(json.distance)}m`;
        }

      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
      }
    }

    init();
  </script>
</body>
</html>
