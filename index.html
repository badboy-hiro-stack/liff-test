  <script>
    function debug(msg) {
      const box = document.getElementById("debug");
      box.textContent += msg + "\n";
    }

    function loadStoreMaster(selectElement, callback) {
      fetch(gasUrl + "?mode=getStoreMaster")
        .then(r => r.json())
        .then(list => {
          list.forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            selectElement.appendChild(opt);
          });
    
          if (callback) callback();
        });
    }

    // 出庫時刻
    function setStartTime() {
        document.getElementById("startTime").value = getNowTime();
    }
    
    // 入庫時刻
    function setEndTime() {
        document.getElementById("endTime").value = getNowTime();
    }
    
    // 積み込み時刻
    function setLoadingTime(btn) {
        btn.parentElement.querySelector(".loadingTime").value = getNowTime();
    }
    
    // 降ろし時刻
    function setUnloadingTime(btn) {
        btn.parentElement.querySelector(".unloadingTime").value = getNowTime();
    }
    
    // 現在時刻（HH:MM）
    function getNowTime() {
        const d = new Date();

    // 降ろし追加（複数件対応）
    async function addUnloadingEvent() {
      const driverName = document.getElementById("driverName").value;
    
      // GAS に「未完了の積み込みイベント」を問い合わせる
      const payload = new URLSearchParams({
        mode: "getUnloadingTarget",
        driverName: driverName
      });
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: payload
      });
    
      const result = await res.json();
      const loads = result.data; // ← 配列で返ってくる
    
      if (!loads || loads.length === 0) {
        alert("未完了の積み込みイベントがありません。");
        return;
      }
    
      // ★ 複数件の積み込みイベントをループしてカード生成
      loads.forEach(loadEvent => {
        const template = document.getElementById("unloadingEventTemplate");
        const clone = template.content.cloneNode(true);
    
        // 積み込みイベントの情報をセット
        clone.querySelector(".unloadingPlace").value = loadEvent.pointName;
        clone.querySelector(".unloadingQty").value = loadEvent.qty;
        clone.querySelector(".unloadingUnit").value = loadEvent.unit;
        clone.querySelector(".unloadingNote").value = loadEvent.note;
    
        // 荷降ろし開始時刻をセット
        clone.querySelector(".unloadingStartTime").value = getNowTime();

        // ★ 行番号を hidden input にセット
        clone.querySelector(".unloadingRowIndex").value = loadEvent.rowIndex;
        
        // 画面に追加
        document.getElementById("unloadingEvents").appendChild(clone);
      });
    }

    // 積み込み送信
    async function saveLoadingEvent(button) {

      // ★ このボタンが属する loading-event カードを取得
      const card = button.closest(".loading-event");

      // ★ 既にセットされている開始時刻を取得
      const startTime = card.querySelector(".loadingStartTime").value;
      
      // ★ 完了時刻を自動セット
      const endTime = getNowTime();
      card.querySelector(".loadingEndTime").value = endTime;
      
      // ★ カード内の値を取得
      const place = card.querySelector(".loadingPlace").value;
      const meter = card.querySelector(".loadingMeter").value;
      const qty = card.querySelector(".loadingQty").value;
      const unit = card.querySelector(".loadingUnit").value;
      const store = card.querySelector(".loadingStore").value;
      const note = card.querySelector(".loadingNote").value;
    
      // ★ GPS取得
      const pos = await getLocation();
      const lat = pos.latitude;
      const lng = pos.longitude;
    
      const params = new URLSearchParams();
      params.append("mode", "loading");
      params.append("driverName", driverName);
      params.append("opDate", document.getElementById("selectedDate").value);
      params.append("startTime", startTime);  // ★ 開始時刻を送る
      params.append("time", endTime);  // ★ 完了時刻を送る
      params.append("store", store);
      params.append("meter", meter);
      params.append("qty", qty);
      params.append("unit", unit);
      params.append("note", note);
      params.append("lat", lat);
      params.append("lng", lng);
      params.append("pointName", place); 
      
      try {
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });
    
        // ★★★ レスポンスを JSON として取得
        const json = await res.json();
    
        // ★★★ 地点名を UI に反映
        if (json.point) {
          card.querySelector(".loadingPlace").value = json.point;
        }
    
        alert(json.message);
    
      } catch (err) {
        alert("fetch エラー: " + err);
      }
      alert("積み込みを保存しました");
    }

    // 画面に値を戻す処理
    function renderDailyReport(events) {
      alert("renderDailyReport START");

      // まず既存のカードを全部消す
      document.getElementById("loadingEvents").innerHTML = "";
      document.getElementById("unloadingEvents").innerHTML = "";
      
      // document.getElementById("endContainer").innerHTML = "";
      // 入庫は class なので querySelector を使う
      const endCard = document.querySelector(".end-event");
      if (endCard) endCard.innerHTML = "";
      
      // 出庫欄も初期化
      document.getElementById("carNumber").value = "";
      document.getElementById("startMeter").value = "";
      document.getElementById("startTime").value = "";
      document.getElementById("startNote").value = "";
    
      events.forEach(ev => {
        const type = ev.eventType;
        const data = ev.eventData;
    
        // 🚚 出庫（start）
        if (type === "start" && data.startstatus == false) {
          alert("出庫の復元開始");
          document.getElementById("carNumber").value = data.carNumber || "";
          document.getElementById("startMeter").value = data.meter || "";
          document.getElementById("startTime").value = data.time || "";
          document.getElementById("startNote").value = data.note || "";
          return;
        }
    
        // 📦 積み込み（load）
        if (type === "load" && ev.unloadFlag == false) {
          alert("積み込みの復元開始");
          const template = document.getElementById("loadingEventTemplate");
          const clone = template.content.cloneNode(true);

    function getOperationDate(timeString) {
      // timeString は "HH:MM" を想定
      const [hour, minute] = timeString.split(":").map(Number);
    
      const now = new Date();
    
      // 20:00〜23:59 は翌日扱い
      if (hour >= 20) {
        now.setDate(now.getDate() + 1);
      }
    
      // YYYY-MM-DD 形式で返す
      return now.toISOString().slice(0, 10);
    }

    // すべてのイベントを送信　2026/5/22
    async function submitDriverReport() {
      try {
        const date = selectedDate;
        const driver = driverName;
        const events = driverEvents;
    
        // ▼ 1. イベントを1つずつ送信
        for (const ev of events) {
          const params = new URLSearchParams();
    
          params.append("mode", ev.mode);
          params.append("date", date);
          params.append("driverName", driver);
    
          for (const key in ev) {
            if (key !== "mode") {
              params.append(key, ev[key]);
            }
          }
    
          await fetch(gasUrl, {
            method: "POST",
            body: params
          });
        }
    
        // ▼ 2. 出庫イベントを完了扱いにする（startstatus:true）
        await fetch(gasUrl, {
          method: "POST",
          body: new URLSearchParams({
            mode: "completeStart",
            driverName: driver
          })
        });
    
        // ▼ 3. 入庫イベントを完了扱いにする（endstatus:true）
        await fetch(gasUrl, {
          method: "POST",
          body: new URLSearchParams({
            mode: "completeEnd",
            driverName: driver
          })
        });
    
        // ▼ 4. 集計を実行
        await fetch(gasUrl, {
          method: "POST",
          body: new URLSearchParams({
            mode: "aggregate",
            date: date,
            driverName: driver
          })
        });
    
        // ▼ 5. 完了メッセージ
        alert("運行日報を送信しました！");
    
      } catch (err) {
        console.error(err);
        alert("送信中にエラーが発生しました");
      }
    }

    function formatDateForTimeCard(dateStr) {

      // "2026/04/13" を安全に分解
      const [year, month, day] = dateStr.split("/").map(Number);
      const d = new Date(year, month - 1, day);
    
      const dd = ("0" + d.getDate()).slice(-2);
      const youbi = ["日","月","火","水","木","金","土"][d.getDay()];
    
      const color =
        youbi === "土" ? "blue" :
        youbi === "日" ? "red"  : "inherit";
    
      return `<span style="font-weight:bold;">${dd}</span><span style="color:${color};">（${youbi}）</span>`;
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";
    
      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;
    
        // LINEプロフィール取得
        const profile = await liff.getProfile();
    
        // ▼ form-urlencoded で送信する
        const params = new URLSearchParams();
        params.append("type", type);
        params.append("lineId", profile.userId);
        params.append("name", profile.displayName);
        params.append("lat", lat);
        params.append("lng", lng);
    
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });

        // ★★★ res.ok をチェック（重要）★★★
        if (!res.ok) {
          throw new Error("HTTPエラー");
        }
        
        const json = await res.json();
    
        // ▼ confirm（再出勤確認）
        if (json.status === "confirm" && json.action === "clock_in") {
          document.getElementById("result").innerText = `【確認】${json.message}`;
    
          const btn = document.getElementById("btnForceIn");
          btn.style.display = "block";
    
          btn.onclick = () => sendForceClockIn(profile.userId, lat, lng);
    
          return json;
        }
    
        // ▼ ステータス表示
        const statusBox = document.getElementById("status");
       
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
          // ★ 作業内容を初期化
          workTasks = "";
        }
  
        if (json.action === "break_start") {
          statusBox.innerText = "休憩中";
          statusBox.style.color = "orange";
        }
  
        if (json.action === "break_end") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
        }
  
        if (json.action === "clock_out") {
          statusBox.innerText = "退勤済み";
          statusBox.style.color = "gray";
        }
    
        // ▼ 結果表示
        let resultText = "";
    
        if (json.status === "success" || json.status === "complete" || json.status === "continue") {
          resultText = json.message;
        } else {
          resultText = `【エラー】\n${json.message}`;
        }
    
        document.getElementById("result").innerText = resultText;
        return json;
    
      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
        return { status: "error", message: e.toString() };
      }
    }

    // 日付を YYYY/MM/DD に整形
    function formatDate(dateString) {
      const d = new Date(dateString);
      const year = d.getFullYear();
      const month = ("0" + (d.getMonth() + 1)).slice(-2);
      const day = ("0" + d.getDate()).slice(-2);
      return `${year}/${month}/${day}`;
    }
    
    // 時刻を HH:MM に整形
    function formatTime(dateString) {
      const d = new Date(dateString);
      const hours = ("0" + d.getHours()).slice(-2);
      const minutes = ("0" + d.getMinutes()).slice(-2);
      return `${hours}:${minutes}`;
    }

    // 日付＋従業員を選んだら GAS に問い合わせ
    let currentList = [];  // ← グローバルに保存しておく
    
    function loadAttendanceForEdit() {
      let date = document.getElementById("editDate").value;
      const name = document.getElementById("editEmployee").value;
    
      if (!date || !name) return;

      // ★ 管理者以外はここでブロック
      if (!isAdminUser) {
        alert("管理者専用機能です");
        return;
      }
      
      // ★ ハイフン → スラッシュ
      date = date.replace(/-/g, "/");
    
      fetch(`${gasUrl}?action=getAttendanceListForDate&date=${date}&name=${name}`)
        .then(res => res.text())
        .then(text => {
          alert(text);   // ← デバッグ用
          const json = JSON.parse(text);

          if (json.status !== "success") {
            alert(json.message);
            return;
          }
    
          currentList = json.list;
    
          const select = document.getElementById("editWorkIndex");
          select.innerHTML = "";
    
          // ★ データエリアをクリア（勤務変更時の残り防止）
          document.getElementById("currentData").textContent = "データを選択してください";
          document.getElementById("editClockIn").value = "";
          document.getElementById("editClockOut").value = "";
          document.getElementById("editBreakMinutes").value = "";
    
          if (currentList.length === 0) {
            select.innerHTML = `<option value="">勤務なし</option>`;
            return;
          }
    
          currentList.forEach(item => {
            const option = document.createElement("option");
            const outText = item.clockOut ? item.clockOut : "未退勤";
            option.value = item.dailyRow;
            option.textContent = `${item.index}勤務目（${item.clockIn}〜${outText}）`;
            select.appendChild(option);
          });
    
          // ★ 勤務が1件しかない場合は自動で選択処理を実行
          if (currentList.length >= 1) {
            select.value = currentList[0].dailyRow;
            loadSelectedWork();
          }
        });
    }

      document.getElementById("editClockOut").value = "";
      document.getElementById("editBreakMinutes").value = "";
    
      const rowIndex = document.getElementById("editWorkIndex").value;
      if (!rowIndex) return;
    
      // ★ dailyRow を使って検索（ここが最重要）
      const item = currentList.find(x => x.dailyRow == rowIndex);
      if (!item) return;
    
      // ★ 選択された勤務のデータを反映
      document.getElementById("editClockIn").value = item.clockIn;
      document.getElementById("editClockOut").value = item.clockOut;
      document.getElementById("editBreakMinutes").value = item.breakMinutes;
    
      document.getElementById("currentData").textContent =
        `出勤：${item.clockIn}　退勤：${item.clockOut || "未退勤"}　休憩：${item.breakMinutes}分`;
    
      debug("選択された勤務：" + JSON.stringify(item));
    }

    // 更新処理
    function saveAttendance() {
      const date = document.getElementById("editDate").value;
      const rowIndex = document.getElementById("editWorkIndex").value;
    
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreak").value;
    
      fetch(`${gasUrl}?action=updateAttendanceByRow`, {
        method: "POST",
        body: JSON.stringify({
          date: date,
          rowIndex: rowIndex,
          clockIn: clockIn,
          clockOut: clockOut,
          breakMinutes: breakMinutes
        })
      })
      .then(res => res.json())
      .then(json => {
        alert(json.message);
      });
    }

    // 更新ボタンで GAS に送信（POST版）
    async function updateAttendance() {
      let date = document.getElementById("editDate").value;
      date = date.replace(/-/g, "/");
    
      const name = document.getElementById("editEmployee").value;
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreakMinutes").value;
    
      if (!date || !name) {
        alert("日付と従業員を選択してください");
        return;
      }
    
      // ★ 選択中の勤務データを取得
      const rowIndex = Number(document.getElementById("editWorkIndex").value);
      const item = currentList.find(x => x.dailyRow === rowIndex);
    
      if (!item) {
        alert("勤務データが取得できませんでした");
        return;
      }
    
      // ★ POST で送るデータ
      const params = new URLSearchParams();
      params.append("action", "updateAttendance");
      params.append("date", date);
      params.append("name", name);
      params.append("clockIn", clockIn);
      params.append("clockOut", clockOut);
      params.append("breakMinutes", breakMinutes);
      params.append("dailyRow", item.dailyRow);
      params.append("clockInRow", item.clockInRow);
      params.append("clockOutRow", item.clockOutRow);
    
      // ★ POST 送信（ここが最重要）
      const res = await fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
      });
    
      const json = await res.json();
    
      alert(json.message);
    
      if (json.status === "success") {
        hideEditScreen();
      }
    }

    function showEditScreen() {
      showScreen("editScreen");
      loadEmployees();
    }

    function hideEditScreen() {
      showScreen("screen-workerMenu");
    }

    // 従業員リストを読み込む関数
    function loadEmployees() {
      const url = `${gasUrl}?action=getEmployeeList`
    
      fetch(url)
        .then(res => res.json())
        .then(list => {
    
          const select = document.getElementById("editEmployee");
          select.innerHTML = "";
    
          list.forEach(name => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
          });
        })
        .catch(err => {
          alert("fetch エラー: " + err);
        });
    }

    // 従業員一覧の読み込み
    async function loadEmployeeList() {
      alert("gasUrl=" + gasUrl);
      const res = await fetch(gasUrl + "?action=getEmployeeListForManage");
      const list = await res.json();
    
      const select = document.getElementById("empSelect");
      select.innerHTML = "";
    
      list.forEach(emp => {
        const option = document.createElement("option");
        option.value = emp.lineId;
        option.textContent = emp.fullName + "（" + emp.dept + "）";
        select.appendChild(option);
      });
    }

    // 退職処理を送信
    async function submitLeave() {
      const lineId = document.getElementById("empSelect").value;
      const leaveDate = document.getElementById("empLeaveDate").value;
    
      if (!leaveDate) {
        alert("退職日を入力してください");
        return;
      }
    
      const payload = {
        mode: "leave",
        lineId,
        leaveDate,
        adminLineId: currentUserId
      };
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const result = await res.json();
      document.getElementById("empManageResult").innerText = result.message;
    }

    // 従業員一覧を読み込む
    async function loadEmployeeListForEdit() {
      const res = await fetch(gasUrl + "?action=getEmployeeListForManage");
      const list = await res.json();
    
      const select = document.getElementById("editEmpSelect");
      select.innerHTML = "";
    
      list.forEach(emp => {
        const option = document.createElement("option");
        option.value = emp.lineId;
        option.textContent = emp.fullName + "（" + emp.dept + "）";
        select.appendChild(option);
      });
    
      // 最初の従業員の情報を読み込む
      if (list.length > 0) {
        loadEmployeeDetail();
      }
    }

    // 選択した従業員の情報を読み込む
    async function loadEmployeeDetail() {
      const lineId = document.getElementById("editEmpSelect").value;
    
      const res = await fetch(gasUrl + "?action=getEmployeeDetail&lineId=" + lineId);
      const emp = await res.json();
    
      document.getElementById("editLastName").value = emp.lastName ?? "";
      document.getElementById("editFirstName").value = emp.firstName ?? "";
      document.getElementById("editDept").value = emp.dept ?? "作業員";
      document.getElementById("editJoinDate").value = emp.joinDate ?? "";
      document.getElementById("editPaidLeave").value = emp.paidLeave ?? 0;
    }

    // 編集内容を保存
    async function submitEmployeeEdit() {
      try {
        const lineId = document.getElementById("editEmpSelect").value;
    
        const payload = {
          mode: "editEmployee",
          lineId,
          lastName: document.getElementById("editLastName").value,
          firstName: document.getElementById("editFirstName").value,
          dept: document.getElementById("editDept").value,
          joinDate: document.getElementById("editJoinDate").value,
          paidLeave: Number(document.getElementById("editPaidLeave").value)
        };
    
        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });
    
        const result = await res.json();
        document.getElementById("editEmpResult").innerText = result.message;
    
      } catch (e) {
        document.getElementById("editEmpResult").innerText =
          "更新中にエラーが発生しました：" + e;
      }
    }

    // 遅刻・早退の申請送信
    async function submitApply() {
    
      // ▼ 種別（遅刻 or 早退）
      const type = document.querySelector("input[name='lateEarlyType']:checked").value;
    
      // ▼ 勤務日
      const date = document.getElementById("applyDate").value;
    
      // ▼ 時刻（正規・実際）
      const official = document.getElementById("officialTime").value;
      const actual   = document.getElementById("actualTime").value;
    
      // ▼ 理由
      const reason = document.getElementById("applyReason").value;
    
      if (!date) {
        alert("勤務日を入力してください");
        return;
      }
    
      if (!actual) {
        alert("実際の時刻を入力してください");
        return;
      }
    
      const params = new URLSearchParams();
      params.append("action", "submitApply");
      params.append("lineId", userId);
      params.append("type", type);        // 遅刻 or 早退
      params.append("date", date);        // 勤務日
      params.append("official", official); // 正規の時刻
      params.append("actual", actual);     // 実際の時刻
      params.append("reason", reason);
    
      try {
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });
    
        const json = await res.json();
    
        if (json.result === "success") {
          alert("申請を送信しました！");
          showScreen("screen-applyMenu");
        } else {
          alert("申請に失敗しました：" + json.message);
        }
    
      } catch (err) {
        console.error("submitApply エラー:", err);
        alert("通信エラーが発生しました");
      }
    }

    // 申請履歴の呼び出し
    async function openApplyHistory() {
      showScreen("screen-applyHistory");
      await loadApplyHistory();
    }

    // 申請履歴カードの作成
    async function loadApplyHistory() {
      const box = document.getElementById("applyHistoryList");
      box.innerHTML = "読み込み中…";
    
      const params = new URLSearchParams();
      params.append("action", "getMyApplies");
      params.append("lineId", userId);
    
      try {
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });
    
        const json = await res.json();
    
        if (json.result !== "success") {
          box.innerHTML = "データ取得に失敗しました";
          return;
        }
    
        const list = json.data;
    
        if (list.length === 0) {
          box.innerHTML = "<p>申請履歴はありません。</p>";
          return;
        }
    
        // カード生成
        box.innerHTML = list.map(item => `
          <div class="apply-card">
            <div><strong>${item.type}</strong></div>
            <div>期間：${formatDate(item.start)} 〜 ${formatDate(item.end)}</div>
            ${item.time ? `<div>時間：${item.time}</div>` : ""}
            <div>理由：${item.reason}</div>
            <div>申請日時：${formatDateTime(item.applyAt)}</div>
            <div>ステータス：${item.status}</div>
            ${item.comment ? `<div>コメント：${item.comment}</div>` : ""}
            ${item.approvedAt ? `<div>承認日時：${formatDateTime(item.approvedAt)}</div>` : ""}
            ${item.approver ? `<div>承認者：${item.approver}</div>` : ""}
          </div>
        `).join("");
    
      } catch (err) {
        console.error(err);
        box.innerHTML = "通信エラーが発生しました";
      }
    }

    // 申請用の日時フォーマット関数
    function formatDateTime(dt) {
      if (!dt) return "";
      const d = new Date(dt);
      const y = d.getFullYear();
      const m = ("0" + (d.getMonth() + 1)).slice(-2);
      const day = ("0" + d.getDate()).slice(-2);
      const h = ("0" + d.getHours()).slice(-2);
      const min = ("0" + d.getMinutes()).slice(-2);
      return `${y}/${m}/${day} ${h}:${min}`;
    }

    // ▼ LIFF 初期化
    init();

    // setupMonthSelect();
  </script>
