<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>位置情報打刻システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>位置情報打刻システム</h2>

  <button id="btnIn">出勤</button>
  <button id="btnOut">退勤</button>

  <p id="result"></p>

  <script>
    const liffId = "2009445215-yPBcEdg0";
    const gasUrl = "あなたのGAS WebアプリURLを入れる";  // ←ここは必ずGASのURLに直してください

    // ▼ 位置情報取得（LIFF v2 正式対応版）
    async function getLocation() {
      // ① 権限確認
      const permission = await liff.permission.query({ scope: "geolocation" });

      // ② 権限がなければリクエスト
      if (permission.state !== "granted") {
        const req = await liff.permission.request({ scope: "geolocation" });
        if (req.state !== "granted") {
          throw "位置情報の権限がありません。";
        }
      }

      // ③ geolocation API で位置情報取得
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject(err)
        );
      });
    }

    // ▼ LIFF 初期化
    async function init() {
      await liff.init({ liffId });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      document.getElementById("btnIn").onclick = () => send("出勤");
      document.getElementById("btnOut").onclick = () => send("退勤");
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";

      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;

        // LINEプロフィール取得
        const profile = await liff.getProfile();

        // 送信データ
        const payload = {
          type: type,
          lineId: profile.userId,
          name: profile.displayName,
          lat: lat,
          lng: lng
        };

        // GASへ送信
        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const json = await res.json();

        // 結果表示
        if (json.status === "success") {
          document.getElementById("result").innerText =
            `【成功】${json.message}\n地点：${json.point}\n距離：${Math.floor(json.distance)}m`;
        } else {
          document.getElementById("result").innerText =
            `【エラー】${json.message}\n距離：${Math.floor(json.distance)}m`;
        }

      } catch (e) {
        document.getElementById("result").innerText = "エラーが発生しました：" + e;
      }
    }

    init();
  </script>
</body>
</html>
