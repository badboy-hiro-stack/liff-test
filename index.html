  <script>
    const liffId = "2009445215-yPBcEdg0";
    const gasUrl = "https://script.google.com/macros/s/AKfycbyBLKRlsLf909TbyXT8m5up65eLiWTxJLayBw21n_oOj9bUPaqwG5bte3YLG7m78uR_/exec";　
    
    // ▼ 位置情報取得（permission API は一切使わない）
    async function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject("位置情報が取得できませんでした：" + err.message),
          { enableHighAccuracy: true }
        );
      });
    }

    let currentWorkRow = null;

    // 従業員登録　LIFF → GAS 送信処理
    async function submitRegister() {
    
      const lastName = document.getElementById("regLastName").value;
      const firstName = document.getElementById("regFirstName").value;
      const dept = document.getElementById("regDept").value;
      const joinDate = document.getElementById("regJoinDate").value;
    
      if (!lastName || !firstName || !dept) {
        alert("未入力があります");
        return;
      }
    
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      // ★ payload を作る
      const payload = {
        mode: "register",
        lineId,
        lastName,
        firstName,
        dept,
        joinDate
      };
    
      try {
        // ★★★ ここが重要：formData を先に宣言する
        const formData = new FormData();
        for (const key in payload) {
          formData.append(key, payload[key]);
        }
    
        // ★ application/json を使わない（Android 対策）
        const res = await fetch(gasUrl, {
          method: "POST",
          body: formData
        });
    
        const text = await res.text();
    
        let result;
        try {
          result = JSON.parse(text);
        } catch (err) {
          alert("⑥ JSON パース失敗: " + err);
          return;
        }
    
        document.getElementById("regResult").innerText = result.message;
    
        if (result.success) {
          if (dept === "運転手") {
            showScreen("screen-driverMenu");
          } else {
            showScreen("screen-workerMenu");
          }
        }
    
      } catch (err) {
        alert("fetch エラー: " + err);
      }
    }
    
    function showTaskScreen(tasks, rowIndex) {
      currentWorkRow = rowIndex;  // ← ここで保持（latestRowIndex は不要）
    
      // ▼ メイン画面を隠して作業画面を表示
      document.getElementById("screen-workerMenu").style.display = "none";
      document.getElementById("taskScreen").style.display = "block";
    
      // ▼ チェックボックスを一旦リセット
      document.getElementById("taskSort").checked = false;
      document.getElementById("taskUnload").checked = false;
      document.getElementById("taskInspect").checked = false;
    
      // ▼ 編集モード（tasks がある場合）
      if (tasks) {
        const arr = tasks.split(",");
    
        arr.forEach(t => {
          if (t === "仕分け") document.getElementById("taskSort").checked = true;
          if (t === "荷バラシ") document.getElementById("taskUnload").checked = true;
          if (t === "検品") document.getElementById("taskInspect").checked = true;
        });
      }

      // ★★★ ここでボタンにイベントを紐付ける ★★★
      document.getElementById("btnTaskSubmit").onclick = submitTasks;
      document.getElementById("btnTaskCancel").onclick = backToMain;
    }
    
    function backToMain() {
      document.getElementById("taskScreen").style.display = "none";
      document.getElementById("screen-workerMenu").style.display = "block";
    }

    async function handleClockOutWithTasks() {
      // ① まず退勤処理を実行
      const result = await send("退勤");
      alert("退勤レスポンス:\n" + JSON.stringify(result, null, 2));
      // ② 退勤失敗（休憩不足など）
      if (result.status !== "success") {
        alert("退勤失敗:\n" + result.message);
        return;
      }
      // ③ ★ rowIndex を受け取って保存
      latestRowIndex = result.data.rowIndex;

      // ④ 退勤成功 → 作業内容画面へ
      showTaskScreen();
    }
    
    // ▼ 新規の退勤処理（GASへ送信）
    function clockOutTasks(tasks) {
      alert("clockOutTasks START");
      setTimeout(() => {
        alert("fetch to: " + gasUrl);
        fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: "作業内容",
            rowIndex: latestRowIndex,
            tasks: tasks
          })
        })
        // .then(res => res.json())
        .then(res => {
          alert("fetch OK, status=" + res.status);
          return res.json();
        })
        .then(json => {
          alert("作業内容を記録しました");
          backToMain();
        })
        .catch(err => {
          alert("fetch ERROR: " + err);
        });
      }, 400);  // ← 150ms が最も安定
    }

    // タイムカード画面表示処理
    async function showTimeCard() {

      // ▼ 画面切り替え（screen を使う構成に統一）
      showScreen("timeCard");
    
      // ▼ 月選択の初期化（初回のみ生成）
      if (document.getElementById("monthSelect").options.length === 0) {
        setupMonthSelect();
      }
    
      // ▼ userId はグローバル変数を使う
      const lineId = userId;
    
      // ▼ 今月の年月を取得
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
    
      // ▼ GAS にリクエスト
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      // ▼ タイムカード画面を描画
      renderTimeCard(json.data, json.total, year, month);
    }

    function formatDateForTimeCard(dateStr) {

      // "2026/04/13" を安全に分解
      const [year, month, day] = dateStr.split("/").map(Number);
      const d = new Date(year, month - 1, day);
    
      const dd = ("0" + d.getDate()).slice(-2);
      const youbi = ["日","月","火","水","木","金","土"][d.getDay()];
    
      const color =
        youbi === "土" ? "blue" :
        youbi === "日" ? "red"  : "inherit";
    
      return `<span style="font-weight:bold;">${dd}</span><span style="color:${color};">（${youbi}）</span>`;
    }


    
    // タイムカード画面の描画
    function renderTimeCard(rows, total, year, month) {
      const container = document.getElementById("timeCardContent");

      // ▼ 検品回数カウント
      let kempinCount = 0;
      rows.forEach(r => {
        if (r.tasks && r.tasks.includes("検品")) {
          kempinCount++;
        }
      });
      
      container.innerHTML = `
        <h2>${year}年${month}月の勤務状況</h2>
    
        <table border="1" class="timecard-table">
          <tr>
            <th>日付</th>
            <th>出勤</th>
            <th>退勤</th>
            <th>労働</th>
            <th>休憩</th>
            <th>残業</th>
          </tr>
    
          ${rows.map((r, index) => `
            <tr class="accordion-row" data-index="${index}">
              <td class="date-cell" data-date="${r.date}"></td>
              <td>${formatTime(r.clockIn)}</td>
              <td>${formatTime(r.clockOut)}</td>
              <td>${r.workMinutes}分</td>
              <td>${r.breakMinutes}分</td>
              <td>${r.overMinutes}分</td>
            </tr>
    
            <tr class="accordion-content" id="acc-${index}" style="display:none;">
              <td colspan="6" style="background:#f9f9f9; padding:10px;">
                <strong>作業内容：</strong><br>
                ${r.tasks ? r.tasks.replace(/,/g, "<br>") : "（なし）"}
              </td>
            </tr>
          `).join("")}
        </table>
    
        <h3>合計</h3>
        <p>労働時間：${total.work}分</p>
        <p>休憩時間：${total.break}分</p>
        <p>残業時間：${total.over}分</p>
        <p>検品回数：${kempinCount}回</p>
      `;

      // ▼ 日付セルに formatDate を適用
      document.querySelectorAll(".date-cell").forEach(cell => {
        cell.innerHTML = formatDateForTimeCard(cell.dataset.date);
      });
    
      // ▼ アコーディオン動作
      document.querySelectorAll(".accordion-row").forEach(row => {
        row.addEventListener("click", () => {
          const index = row.dataset.index;
          const content = document.getElementById(`acc-${index}`);
          content.style.display = (content.style.display === "none") ? "table-row" : "none";
        });
      });
    }

    // 月選択ドロップダウンを生成
    function setupMonthSelect() {
      const select = document.getElementById("monthSelect");
      const now = new Date();
      const year = now.getFullYear();
    
      // 過去12ヶ月分を表示
      for (let i = 0; i < 12; i++) {
        const d = new Date(year, now.getMonth() - i, 1);
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
    
        const option = document.createElement("option");
        option.value = `${y}-${m}`;
        option.textContent = `${y}年${m}月`;
    
        if (i === 0) option.selected = true; // 今月をデフォルト
        select.appendChild(option);
      }
    }

    // 月変更時の処理
    async function changeMonth() {
      const value = document.getElementById("monthSelect").value;
      const [year, month] = value.split("-");
    
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      renderTimeCard(json.data, json.total, year, month);
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";
    
      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;
    
        // LINEプロフィール取得
        const profile = await liff.getProfile();
    
        // ▼ form-urlencoded で送信する
        const params = new URLSearchParams();
        params.append("type", type);
        params.append("lineId", profile.userId);
        params.append("name", profile.displayName);
        params.append("lat", lat);
        params.append("lng", lng);
    
        const res = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params
        });

        // ★★★ res.ok をチェック（重要）★★★
        if (!res.ok) {
          throw new Error("HTTPエラー");
        }
        
        const json = await res.json();
    
        // ▼ confirm（再出勤確認）
        if (json.status === "confirm" && json.action === "clock_in") {
          document.getElementById("result").innerText = `【確認】${json.message}`;
    
          const btn = document.getElementById("btnForceIn");
          btn.style.display = "block";
    
          btn.onclick = () => sendForceClockIn(profile.userId, lat, lng);
    
          return json;
        }
    
        // ▼ ステータス表示
        const statusBox = document.getElementById("status");
       
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
          // ★ 作業内容を初期化
          workTasks = "";
        }
  
        if (json.action === "break_start") {
          statusBox.innerText = "休憩中";
          statusBox.style.color = "orange";
        }
  
        if (json.action === "break_end") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
        }
  
        if (json.action === "clock_out") {
          statusBox.innerText = "退勤済み";
          statusBox.style.color = "gray";
        }
    
        // ▼ 結果表示
        let resultText = "";
    
        if (json.status === "success" || json.status === "complete" || json.status === "continue") {
          resultText = json.message;
        } else {
          resultText = `【エラー】\n${json.message}`;
        }
    
        document.getElementById("result").innerText = resultText;
        return json;
    
      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
        return { status: "error", message: e.toString() };
      }
    }

    async function sendForceClockIn(lineId, lat, lng) {
      const payload = new FormData();
      payload.append("action", "clock_in");
      payload.append("type", "出勤");
      payload.append("lineId", lineId);
      payload.append("lat", lat);
      payload.append("lng", lng);
      payload.append("force", "true");
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: payload
      });
    
      const json = await res.json();
    
      document.getElementById("btnForceIn").style.display = "none";
    
      const statusBox = document.getElementById("status");
    
      if (
        json.status === "success" ||
        json.status === "complete" ||
        json.status === "continue"
      ) {
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";

          // ★ これを追加（最重要）
          statusBox.style.display = "inline-block";
        }
      }
    
      document.getElementById("result").innerText = json.message;
    }

    // 現在のステータスを読み込む関数を追加　送信方式の変更
    async function loadCurrentStatus(lineId) {
      const params = new URLSearchParams();
      params.append("type", "status");
      params.append("lineId", lineId);
    
      const res = await fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
      });
    
      const json = await res.json();
      const statusBox = document.getElementById("status");
    
      if (json.status === "work") {
        statusBox.innerText = "勤務中";
        statusBox.style.color = "green";
      
      } else if (json.status === "break") {
        statusBox.innerText = "休憩中";
        statusBox.style.color = "orange";
      
      } else if (json.status === "finished") {
        statusBox.innerText = "退勤済み";
        statusBox.style.color = "gray";
      
      } else {
        statusBox.innerText = "未出勤";
        statusBox.style.color = "red";
      }
    }

    // 日付を YYYY/MM/DD に整形
    function formatDate(dateString) {
      const d = new Date(dateString);
      const year = d.getFullYear();
      const month = ("0" + (d.getMonth() + 1)).slice(-2);
      const day = ("0" + d.getDate()).slice(-2);
      return `${year}/${month}/${day}`;
    }
    
    // 時刻を HH:MM に整形
    function formatTime(dateString) {
      const d = new Date(dateString);
      const hours = ("0" + d.getHours()).slice(-2);
      const minutes = ("0" + d.getMinutes()).slice(-2);
      return `${hours}:${minutes}`;
    }

    function renderStatusList(data) {
      const working = data.working;
      const finished = data.finished;
    
      let html = "";
    
      // ▼ 勤務中グループ
      html += `<div class="status-group-title">🟢 勤務中（${working.length}名）</div>`;
    
      working.forEach(item => {
        const cardClass = item.status === "休憩中" ? "card-break" : "card-working";
    
        html += `
          <div class="card ${cardClass}">
            <div class="name">${item.name}</div>
            <div class="detail">勤務日：${item.workDate}</div>
            <div class="detail">ステータス：${item.status}</div>
            <div class="detail">最終地点：${item.place}</div>
            <div class="detail">休憩時間：${item.breakMinutes} 分</div>
          </div>
        `;
      });
    
      // ▼ 退勤済みグループ
      html += `<div class="status-group-title">🔵 退勤済み（${finished.length}名）</div>`;
    
      finished.forEach(item => {
        html += `
          <div class="card card-finished">
            <div class="name">${item.name}</div>
            <div class="detail">勤務日：${item.workDate}</div>
            <div class="detail">ステータス：退勤済み</div>
            <div class="detail">退勤地点：${item.place}</div>
            <div class="detail">労働時間：${item.workMinutes} 分</div>
            <div class="detail">休憩時間：${item.breakMinutes} 分</div>
            <div class="detail">残業時間：${item.overtimeMinutes} 分</div>
            <div class="detail">作業内容：${item.tasks ?? "（未報告）"}</div>
          </div>
        `;
      });
    
      document.getElementById("statusList").innerHTML = html;
    }

      // ★ 管理者以外はここでブロック
      if (!isAdminUser) {
        alert("管理者専用機能です");
        return;
      }
      
      // ★ ハイフン → スラッシュ
      date = date.replace(/-/g, "/");
    
      fetch(`${gasUrl}?action=getAttendanceListForDate&date=${date}&name=${name}`)
        .then(res => res.text())
        .then(text => {
          alert(text);   // ← デバッグ用
          const json = JSON.parse(text);

          if (json.status !== "success") {
            alert(json.message);
            return;
          }
    
          currentList = json.list;
    
          const select = document.getElementById("editWorkIndex");
          select.innerHTML = "";
    
          // ★ データエリアをクリア（勤務変更時の残り防止）
          document.getElementById("currentData").textContent = "データを選択してください";
          document.getElementById("editClockIn").value = "";
          document.getElementById("editClockOut").value = "";
          document.getElementById("editBreakMinutes").value = "";
    
          if (currentList.length === 0) {
            select.innerHTML = `<option value="">勤務なし</option>`;
            return;
          }
    
          currentList.forEach(item => {
            const option = document.createElement("option");
            const outText = item.clockOut ? item.clockOut : "未退勤";
            option.value = item.dailyRow;
            option.textContent = `${item.index}勤務目（${item.clockIn}〜${outText}）`;
            select.appendChild(option);
          });
    
          // ★ 勤務が1件しかない場合は自動で選択処理を実行
          if (currentList.length >= 1) {
            select.value = currentList[0].dailyRow;
            loadSelectedWork();
          }
        });
    }

    function debug(msg) {
      document.getElementById("debug").textContent += msg + "\n";
    }
    
    function loadSelectedWork() {
      // ★ まずデータエリアをクリア
      document.getElementById("currentData").textContent = "データを選択してください";
      document.getElementById("editClockIn").value = "";
      document.getElementById("editClockOut").value = "";
      document.getElementById("editBreakMinutes").value = "";
    
      const rowIndex = document.getElementById("editWorkIndex").value;
      if (!rowIndex) return;
    
      // ★ dailyRow を使って検索（ここが最重要）
      const item = currentList.find(x => x.dailyRow == rowIndex);
      if (!item) return;
    
      // ★ 選択された勤務のデータを反映
      document.getElementById("editClockIn").value = item.clockIn;
      document.getElementById("editClockOut").value = item.clockOut;
      document.getElementById("editBreakMinutes").value = item.breakMinutes;
    
      document.getElementById("currentData").textContent =
        `出勤：${item.clockIn}　退勤：${item.clockOut || "未退勤"}　休憩：${item.breakMinutes}分`;
    
      debug("選択された勤務：" + JSON.stringify(item));
    }

    // 更新処理
    function saveAttendance() {
      const date = document.getElementById("editDate").value;
      const rowIndex = document.getElementById("editWorkIndex").value;
    
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreak").value;
    
      fetch(`${gasUrl}?action=updateAttendanceByRow`, {
        method: "POST",
        body: JSON.stringify({
          date: date,
          rowIndex: rowIndex,
          clockIn: clockIn,
          clockOut: clockOut,
          breakMinutes: breakMinutes
        })
      })
      .then(res => res.json())
      .then(json => {
        alert(json.message);
      });
    }

    // 更新ボタンで GAS に送信（POST版）
    async function updateAttendance() {
      let date = document.getElementById("editDate").value;
      date = date.replace(/-/g, "/");
    
      const name = document.getElementById("editEmployee").value;
      const clockIn = document.getElementById("editClockIn").value;
      const clockOut = document.getElementById("editClockOut").value;
      const breakMinutes = document.getElementById("editBreakMinutes").value;
    
      if (!date || !name) {
        alert("日付と従業員を選択してください");
        return;
      }
    
      // ★ 選択中の勤務データを取得
      const rowIndex = Number(document.getElementById("editWorkIndex").value);
      const item = currentList.find(x => x.dailyRow === rowIndex);
    
      if (!item) {
        alert("勤務データが取得できませんでした");
        return;
      }
    
      // ★ POST で送るデータ
      const params = new URLSearchParams();
      params.append("action", "updateAttendance");
      params.append("date", date);
      params.append("name", name);
      params.append("clockIn", clockIn);
      params.append("clockOut", clockOut);
      params.append("breakMinutes", breakMinutes);
      params.append("dailyRow", item.dailyRow);
      params.append("clockInRow", item.clockInRow);
      params.append("clockOutRow", item.clockOutRow);
    
      // ★ POST 送信（ここが最重要）
      const res = await fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
      });
    
      const json = await res.json();
    
      alert(json.message);
    
      if (json.status === "success") {
        hideEditScreen();
      }
    }

    function showEditScreen() {
      // 他の画面を非表示
      /* document.getElementById("mainScreen").style.display = "none";
      document.getElementById("statusListScreen").style.display = "none";
      document.getElementById("timeCard").style.display = "none"; */
      document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    
      // 修正画面を表示
      document.getElementById("editScreen").style.display = "block";
      
      // F-Serviceの従業員のみ対応
      loadEmployees();
    }
    
    function hideEditScreen() {
      // 修正画面を非表示
      document.getElementById("editScreen").style.display = "none";
    
      // メイン画面に戻る（あなたの構成に合わせて変更可能）
      document.getElementById("screen-workerMenu").style.display = "block";
    }

    // 従業員リストを読み込む関数
    function loadEmployees() {
      const url = `${gasUrl}?action=getEmployeeList`
    
      fetch(url)
        .then(res => res.json())
        .then(list => {
    
          const select = document.getElementById("editEmployee");
          select.innerHTML = "";
    
          list.forEach(name => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
          });
        })
        .catch(err => {
          alert("fetch エラー: " + err);
        });
    }

    // 従業員一覧の読み込み
    async function loadEmployeeList() {
      const res = await fetch(GAS_URL + "?action=getEmployeeListForManage");
      const list = await res.json();
    
      const select = document.getElementById("empSelect");
      select.innerHTML = "";
    
      list.forEach(emp => {
        const option = document.createElement("option");
        option.value = emp.lineId;
        option.textContent = emp.fullName + "（" + emp.dept + "）";
        select.appendChild(option);
      });
    }

    // 退社処理を送信
    async function submitLeave() {
      const lineId = document.getElementById("empSelect").value;
      const leaveDate = document.getElementById("empLeaveDate").value;
    
      if (!leaveDate) {
        alert("退社日を入力してください");
        return;
      }
    
      const payload = {
        mode: "leave",
        lineId,
        leaveDate
      };
    
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const result = await res.json();
      document.getElementById("empManageResult").innerText = result.message;
    }

    // 従業員一覧を読み込む
    async function loadEmployeeListForEdit() {
      const res = await fetch(GAS_URL + "?action=getEmployeeListForManage");
      const list = await res.json();
    
      const select = document.getElementById("editEmpSelect");
      select.innerHTML = "";
    
      list.forEach(emp => {
        const option = document.createElement("option");
        option.value = emp.lineId;
        option.textContent = emp.fullName + "（" + emp.dept + "）";
        select.appendChild(option);
      });
    
      // 最初の従業員の情報を読み込む
      if (list.length > 0) {
        loadEmployeeDetail();
      }
    }

    // 選択した従業員の情報を読み込む
    async function loadEmployeeDetail() {
      const lineId = document.getElementById("editEmpSelect").value;
    
      const res = await fetch(GAS_URL + "?action=getEmployeeDetail&lineId=" + lineId);
      const emp = await res.json();
    
      document.getElementById("editLastName").value = emp.lastName;
      document.getElementById("editFirstName").value = emp.firstName;
      document.getElementById("editDept").value = emp.dept;
      document.getElementById("editJoinDate").value = emp.joinDate;
    }

    // 編集内容を保存
    async function submitEmployeeEdit() {
      const lineId = document.getElementById("editEmpSelect").value;
    
      const payload = {
        mode: "editEmployee",
        lineId,
        lastName: document.getElementById("editLastName").value,
        firstName: document.getElementById("editFirstName").value,
        dept: document.getElementById("editDept").value,
        joinDate: document.getElementById("editJoinDate").value
      };
    
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const result = await res.json();
      document.getElementById("editEmpResult").innerText = result.message;
    }

    // ▼ LIFF 初期化
    init();

    // setupMonthSelect();
  </script>
</body>
