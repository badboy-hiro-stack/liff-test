<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>位置情報打刻システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>位置情報打刻システム</h2>

  <button id="btnIn">出勤</button>
  <button id="btnOut">退勤</button>

  <p id="result"></p>

  <script>
    const liffId = "あなたのLIFF IDを入れる";
    const gasUrl = "あなたのGAS WebアプリURLを入れる";

    async function init() {
      await liff.init({ liffId });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      document.getElementById("btnIn").onclick = () => send("出勤");
      document.getElementById("btnOut").onclick = () => send("退勤");
    }

    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";

      try {
        const pos = await liff.getCurrentPosition();
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const profile = await liff.getProfile();

        const payload = {
          type: type,
          lineId: profile.userId,
          name: profile.displayName,
          lat: lat,
          lng: lng
        };

        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const json = await res.json();

        if (json.status === "success") {
          document.getElementById("result").innerText =
            `【成功】${json.message}\n地点：${json.point}\n距離：${Math.floor(json.distance)}m`;
        } else {
          document.getElementById("result").innerText =
            `【エラー】${json.message}\n距離：${Math.floor(json.distance)}m`;
        }

      } catch (e) {
        document.getElementById("result").innerText = "エラーが発生しました：" + e;
      }
    }

    init();
  </script>
</body>
</html>
