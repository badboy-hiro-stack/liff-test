<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>新世代のGPS打刻システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-size: 36px;
    text-align: center;
    background: #f5f7fa;
    padding: 20px;
    font-family: sans-serif;
  }

  /* 2×2 グリッド配置 */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr; /* 2列 */
    gap: 25px; /* ボタン間隔 */
    width: 90%;
    margin: 0 auto;
    margin-top: 30px;
  }

  /* ボタンデザイン */
  .btn.big {
    width: 100%;
    height: 200px;
    padding: 40px 0; /* 大きくする */
    font-size: 40px;
    border-radius: 18px;
    border: none;
    background: #4a90e2;
    color: white;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    transition: 0.15s ease;
  }

  /* 押した時の視覚効果 */
  .btn.big:active {
    transform: scale(0.95);
    background: #357ABD;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
  }

  /* ステータス表示 */
  #status {
    margin-top: 20px;
    padding: 15px;
    font-size: 36px;
    font-weight: bold;
    border-radius: 12px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: inline-block;
    min-width: 300px;
  }

  /* 再出勤ボタン（単独表示用） */
  .btn.force {
    margin: 0 auto;
    margin-top: 30px;
    width: 90%;
    padding: 30px;
    font-size: 36px;
    border-radius: 14px;
    border: none;
    background: #e67e22; /* オレンジ系で注意喚起 */
    color: white;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    transition: 0.15s ease;
  }

  .btn.force:active {
    transform: scale(0.95);
    background: #cf6d1a;
  }

    /* 勤務状態ボタン（単独表示用） */
  .btn.time {
    margin: 0 auto;
    margin-top: 30px;
    width: 90%;
    padding: 30px;
    font-size: 36px;
    border-radius: 14px;
    border: none;
    background: #22e69e;
    color: white;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    transition: 0.15s ease;
  }

  .btn.time:active {
    transform: scale(0.95);
    background: #13bf80;
  }

  #result {
    font-size: 36px;
    margin-top: 20px;
    line-height: 1.6;
    white-space: pre-line;
    min-height: 60px;
  }

  /* ▼ 月選択ドロップダウン */
.month-select {
  width: 100%;
  padding: 10px;
  font-size: 18px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* ▼ タイムカード表 */
.timecard-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 16px;
}

.timecard-table th {
  background: #4CAF50;
  color: white;
  padding: 8px;
  position: sticky;
  top: 0;
}

.timecard-table td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

/* ▼ ストライプ */
.timecard-table tr:nth-child(even) {
  background: #f9f9f9;
}

/* ▼ 合計欄 */
.total-card {
  margin-top: 15px;
  padding: 15px;
  background: #eef7ff;
  border-radius: 8px;
  border: 1px solid #bcdcff;
  font-size: 18px;
}

</style>

<body>
  <h2>打刻システム(GPS対応)</h2>

  <!-- 2×2の表示 -->
  <div class="grid">
    <button class="btn big" id="btnIn">出勤</button>
    <button class="btn big" id="btnOut">退勤</button>
  
    <button class="btn big" id="btnBreakStart">休憩開始</button>
    <button class="btn big" id="btnBreakEnd">休憩終了</button>
  </div>

  <div class="row">
    <button class="btn time" id="btnStatus" onclick="showTimeCard()">勤務状態</button>
  </div>

  <div class="row">
    <button class="btn back" id="btnBack" style="display:none;">戻る</button>
  </div>
  
  <!-- 再出勤ボタンの表示 -->
  <div class="row">
    <button class="btn force" id="btnForceIn" style="display:none;">再出勤する</button>
  </div>

  <!-- ステータス表示 -->
  <div id="status" style="font-size: 60px; font-weight: bold; margin-top: 15px;"></div>

  <p id="result"></p>

  <div id="timeCard" style="display:none; margin-top:20px;">
    <div style="margin-bottom:10px;">
      <select id="monthSelect" onchange="changeMonth()"></select>
    </div>
    <div id="timeCardContent"></div>
  </div>
  
  <script>
    const liffId = "2009445215-yPBcEdg0";
    const gasUrl = "https://script.google.com/macros/s/AKfycbwND9ZrLBq4KzUqp-8jrp7JBmREJCHRdkuQripZGiLSUIZBOxNlJ-QclgDS0ci6e8B_/exec";  // ←ここを必ず修正

    // ▼ 位置情報取得（permission API は一切使わない）
    async function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(
          pos => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude
          }),
          err => reject("位置情報が取得できませんでした：" + err.message),
          { enableHighAccuracy: true }
        );
      });
    }

    // タイムカード画面表示処理
    async function showTimeCard() {
      // ▼ メイン画面を隠す
      document.querySelector(".grid").style.display = "none";
      document.getElementById("btnStatus").style.display = "none";
      document.getElementById("btnForceIn").style.display = "none";
      document.getElementById("status").style.display = "none";
      document.getElementById("result").style.display = "none";
    
      // ▼ タイムカード画面を表示
      document.getElementById("timeCard").style.display = "block";
    
      // ▼ ★ 戻るボタンを表示
      document.getElementById("btnBack").style.display = "block";
      
      // ▼ LINE ID を取得
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      // ▼ 今月の年月を取得
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
    
      // ▼ GAS にリクエスト
      const url = `${GAS_URL}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      // ▼ タイムカード画面を描画
      renderTimeCard(json.data, json.total, year, month);
    }

    // タイムカード画面の描画
    function renderTimeCard(rows, total, year, month) {
      const container = document.getElementById("timeCardContent");
      container.innerHTML = `
        <h2>${year}年${month}月の勤務状況</h2>
    
        <table border="1">
          <tr>
            <th>日付</th>
            <th>出勤</th>
            <th>退勤</th>
            <th>労働</th>
            <th>休憩</th>
            <th>残業</th>
          </tr>
          ${rows.map(r => `
            <tr>
              <td>${r.date}</td>
              <td>${r.clockIn}</td>
              <td>${r.clockOut}</td>
              <td>${r.workMinutes}分</td>
              <td>${r.breakMinutes}分</td>
              <td>${r.overMinutes}分</td>
            </tr>
          `).join("")}
        </table>
    
        <h3>合計</h3>
        <p>労働時間：${total.work}分</p>
        <p>休憩時間：${total.break}分</p>
        <p>残業時間：${total.over}分</p>
      `;
    }

    // 月選択ドロップダウンを生成
    function setupMonthSelect() {
      const select = document.getElementById("monthSelect");
      const now = new Date();
      const year = now.getFullYear();
    
      // 過去12ヶ月分を表示
      for (let i = 0; i < 12; i++) {
        const d = new Date(year, now.getMonth() - i, 1);
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
    
        const option = document.createElement("option");
        option.value = `${y}-${m}`;
        option.textContent = `${y}年${m}月`;
    
        if (i === 0) option.selected = true; // 今月をデフォルト
        select.appendChild(option);
      }
    }

    // 月変更時の処理
    async function changeMonth() {
      const value = document.getElementById("monthSelect").value;
      const [year, month] = value.split("-");
    
      const profile = await liff.getProfile();
      const lineId = profile.userId;
    
      const url = `${gasUrl}?action=getMonthlySummary&lineId=${lineId}&year=${year}&month=${month}`;
      const res = await fetch(url);
      const json = await res.json();
    
      if (json.status !== "success") {
        alert(json.message);
        return;
      }
    
      renderTimeCard(json.data, json.total, year, month);
    }
    
    // ▼ LIFF 初期化
    async function init() {
      await liff.init({ liffId });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      // ▼ 起動時に必ず再出勤ボタンを隠す
      document.getElementById("btnForceIn").style.display = "none";

      // ▼ LIFF起動時に現在のステータスを取得
      const profile = await liff.getProfile();
      loadCurrentStatus(profile.userId);

      document.getElementById("btnIn").onclick = () => send("出勤");
      document.getElementById("btnOut").onclick = () => send("退勤");
      document.getElementById("btnBreakStart").onclick = () => send("休憩開始");
      document.getElementById("btnBreakEnd").onclick = () => send("休憩終了");
      document.getElementById("btnStatus").onclick = () => showTimeCard();
      document.getElementById("timeCard").style.display = "none";
    }

    // ▼ 打刻処理
    async function send(type) {
      document.getElementById("result").innerText = "位置情報取得中…";
    
      try {
        // 位置情報取得
        const pos = await getLocation();
        const lat = pos.latitude;
        const lng = pos.longitude;
    
        // LINEプロフィール取得
        const profile = await liff.getProfile();
    
        // 送信データ
        const payload = {
          type: type,
          lineId: profile.userId,
          name: profile.displayName,
          lat: lat,
          lng: lng
        };
    
        // GASへ送信
        const res = await fetch(gasUrl, {
          method: "POST",
          body: JSON.stringify(payload)
        });
    
        const json = await res.json();
    
        // ▼ ★★★ ここが重要：confirm の処理 ★★★
        if (json.status === "confirm" && json.action === "clock_in") {
          document.getElementById("result").innerText = `【確認】${json.message}`;
        
          // 再出勤ボタンを表示
          const btn = document.getElementById("btnForceIn");
          btn.style.display = "block";
        
          // ボタン押下で force:true を付けて再送信
          btn.onclick = () => sendForceClockIn(profile.userId, lat, lng);
        
          return; // confirm の場合はここで終了
        }
    
        // ▼ ステータス表示（成功したときだけ更新）
        const statusBox = document.getElementById("status");
        
        if (
          json.status === "success" ||
          json.status === "complete" ||
          json.status === "continue"
        ) {
        
          if (json.action === "clock_in") {
            statusBox.innerText = "出勤中";
            statusBox.style.color = "green";
          }
        
          if (json.action === "break_start") {
            statusBox.innerText = "休憩中";
            statusBox.style.color = "orange";
          }
        
          if (json.action === "break_end") {
            statusBox.innerText = "出勤中";
            statusBox.style.color = "green";
          }
        
          if (json.action === "clock_out") {
            statusBox.innerText = "";
          }
        }
    
        // ▼ 結果表示
        let resultText = "";
    
        if (json.status === "success" || json.status === "complete" || json.status === "continue") {
      
          if (json.action === "clock_in" || json.action === "clock_out") {
            const dist = (json.distance !== undefined) ? Math.floor(json.distance) : "";
            resultText =
              `【成功】${json.message}\n地点：${json.point}\n距離：${dist}m`;
          }
        
          if (json.action === "break_start" || json.action === "break_end") {
            resultText = `【成功】${json.message}`;
          }
        
        } else {
        
          if (json.action === "clock_in" || json.action === "clock_out") {
            const dist = (json.distance !== undefined) ? Math.floor(json.distance) : "";
            resultText =
              `【エラー】${json.message}\n距離：${dist}m`;
          } else {
            resultText = `【エラー】${json.message}`;
          }
        }
    
        document.getElementById("result").innerText = resultText;
    
      } catch (e) {
        document.getElementById("result").innerText = "エラー：" + e;
      }
    }

    // 再出勤（force:true）を送る関数
    async function sendForceClockIn(lineId, lat, lng) {
      const payload = {
        type: "出勤",
        lineId: lineId,
        lat: lat,
        lng: lng,
        force: true
      };
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const json = await res.json();
    
      // ▼ 再出勤ボタンを隠す
      document.getElementById("btnForceIn").style.display = "none";
    
      // ▼ ステータス更新（send() と同じ成功条件）
      const statusBox = document.getElementById("status");
    
      if (
        json.status === "success" ||
        json.status === "complete" ||
        json.status === "continue"
      ) {
        if (json.action === "clock_in") {
          statusBox.innerText = "出勤中";
          statusBox.style.color = "green";
        }
      }
    
      // ▼ 結果表示
      document.getElementById("result").innerText = `【成功】${json.message}`;
    }

    // 現在のステータスを読み込む関数を追加
    async function loadCurrentStatus(lineId) {
      const payload = {
        type: "status",
        lineId: lineId
      };
    
      const res = await fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    
      const json = await res.json();
      const statusBox = document.getElementById("status");
    
      if (json.status === "work") {
        statusBox.innerText = "出勤中";
        statusBox.style.color = "green";
      } else if (json.status === "break") {
        statusBox.innerText = "休憩中";
        statusBox.style.color = "orange";
      } else {
        statusBox.innerText = "";
      }
    }

    // ▼ 戻るボタンの処理（グローバル）
    document.getElementById("btnBack").onclick = () => {
      // タイムカード画面を隠す
      document.getElementById("timeCard").style.display = "none";
      document.getElementById("btnBack").style.display = "none";
  
      // メイン画面を表示
      document.querySelector(".grid").style.display = "grid";
      document.getElementById("btnStatus").style.display = "block";
      document.getElementById("status").style.display = "block";
      document.getElementById("result").style.display = "block";
    };

    // ▼ LIFF 初期化
    init();
    setupMonthSelect();
  </script>
</body>
</html>
